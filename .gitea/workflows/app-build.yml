name: APP Build

on:
  push:
    tags:
      - 'v*.*.*'
      - 'app-*'

env:
  EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
  EAS_BUILD_NO_EXPO_GO_WARNING: "true"
  API_BASE_URL: "https://backend.pinf.top/api"

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      app_changed: ${{ steps.check_app.outputs.changes_detected }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check app_end changes
        id: check_app
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            echo "changes_detected=true" >> $GITHUB_OUTPUT
            echo "No previous tag found, checking..."
            git diff --name-only origin/${{ github.default_branch }} | grep -q '^app_end/' && echo "app_end has changes" || echo "app_end has no changes"
          else
            if git diff --name-only $PREV_TAG ${{ github.ref_name }} | grep -q '^app_end/'; then
              echo "changes_detected=true" >> $GITHUB_OUTPUT
              echo "Detected app_end directory changes"
            else
              echo "changes_detected=false" >> $GITHUB_OUTPUT
              echo "app_end directory has no changes"
            fi
          fi

  build-app:
    needs: detect-changes
    if: needs.detect-changes.outputs.app_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js (nvm)
        run: |
          set -euo pipefail
          export NVM_DIR="${NVM_DIR:-$HOME/.nvm}"
          if [ ! -s "$NVM_DIR/nvm.sh" ]; then
            echo "nvm not found at $NVM_DIR/nvm.sh"
            exit 1
          fi

          # shellcheck disable=SC1090
          . "$NVM_DIR/nvm.sh"
          nvm install 20
          nvm use 20

          NODE_BIN_DIR="$(dirname "$(command -v node)")"
          echo "$NODE_BIN_DIR" >> "$GITHUB_PATH"
          echo "NVM_DIR=$NVM_DIR" >> "$GITHUB_ENV"

          node --version
          npm --version

      - name: Extract version from tag
        run: echo "APP_VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Setup EAS
        run: npm install -g eas-cli

      - name: Trigger build
        working-directory: ${{ vars.APP_PATH }}
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

          BUILD_OUTPUT=$(eas build --platform android --profile production --non-interactive --wait --json)
          echo "$BUILD_OUTPUT" > build_output.json

          BUILD_URL=$(echo "$BUILD_OUTPUT" | jq -r 'if type=="array" then .[0].artifacts.buildUrl // .[0].artifacts.applicationArchiveUrl // empty else .artifacts.buildUrl // .artifacts.applicationArchiveUrl // empty end')
          if [ -z "$BUILD_URL" ]; then
            echo "Build artifact URL not found in EAS output"
            cat build_output.json
            exit 1
          fi

          curl -L "$BUILD_URL" -o "${{ github.workspace }}/pinf-${{ github.ref_name }}.apk"
        env:
          APP_VERSION: ${{ env.APP_VERSION }}

      - name: Generate Release Notes
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            echo "## Updates" > release_notes.txt
            git log $PREV_TAG..${{ github.ref_name }} --pretty=format:"- %s" >> release_notes.txt
          else
            echo "## Initial Release" > release_notes.txt
            git log --pretty=format:"- %s" -10 >> release_notes.txt
          fi

      - name: Create Gitea Release
        env:
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          API_BASE="${GITHUB_SERVER_URL%/}/api/v1"
          OWNER="${GITHUB_REPOSITORY%/*}"
          REPO="${GITHUB_REPOSITORY#*/}"
          TAG="${GITHUB_REF_NAME}"
          APK_FILE="pinf-${TAG}.apk"

          if [ ! -f "$APK_FILE" ]; then
            echo "APK file not found: $APK_FILE"
            exit 1
          fi

          RELEASE_PAYLOAD=$(jq -n \
            --arg tag "$TAG" \
            --arg name "App $TAG" \
            --arg body "$(cat release_notes.txt)" \
            '{tag_name:$tag,name:$name,body:$body,draft:false,prerelease:false}')

          CREATE_RESPONSE=$(curl -sS -X POST \
            -H "Authorization: token ${GITEA_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$RELEASE_PAYLOAD" \
            "${API_BASE}/repos/${OWNER}/${REPO}/releases" \
            -w '\n%{http_code}')

          CREATE_BODY=$(echo "$CREATE_RESPONSE" | sed '$d')
          CREATE_CODE=$(echo "$CREATE_RESPONSE" | tail -n1)

          if [ "$CREATE_CODE" = "201" ]; then
            RELEASE_ID=$(echo "$CREATE_BODY" | jq -r '.id')
          else
            GET_RESPONSE=$(curl -sS \
              -H "Authorization: token ${GITEA_TOKEN}" \
              "${API_BASE}/repos/${OWNER}/${REPO}/releases/tags/${TAG}" \
              -w '\n%{http_code}')
            GET_BODY=$(echo "$GET_RESPONSE" | sed '$d')
            GET_CODE=$(echo "$GET_RESPONSE" | tail -n1)

            if [ "$GET_CODE" != "200" ]; then
              echo "Create release failed (${CREATE_CODE}), and release by tag not found (${GET_CODE})."
              echo "$CREATE_BODY"
              echo "$GET_BODY"
              exit 1
            fi
            RELEASE_ID=$(echo "$GET_BODY" | jq -r '.id')
          fi

          UPLOAD_RESPONSE=$(curl -sS -X POST \
            -H "Authorization: token ${GITEA_TOKEN}" \
            -F "attachment=@${APK_FILE}" \
            "${API_BASE}/repos/${OWNER}/${REPO}/releases/${RELEASE_ID}/assets?name=${APK_FILE}" \
            -w '\n%{http_code}')

          UPLOAD_BODY=$(echo "$UPLOAD_RESPONSE" | sed '$d')
          UPLOAD_CODE=$(echo "$UPLOAD_RESPONSE" | tail -n1)
          if [ "$UPLOAD_CODE" != "201" ]; then
            echo "Upload asset failed: HTTP ${UPLOAD_CODE}"
            echo "$UPLOAD_BODY"
            exit 1
          fi
