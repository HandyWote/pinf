name: APP Build

on:
  push:
    tags:
      - 'v*.*.*'
      - 'app-*'

env:
  EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

jobs:
  # Job 1: 检测 app_end 变更
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      app_changed: ${{ steps.check_app.outputs.changes_detected }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check app_end changes
        id: check_app
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            echo "changes_detected=true" >> $GITHUB_OUTPUT
            echo "没有找到上一个 tag，将进行检测"
            git diff --name-only origin/${{ github.default_branch }} | grep -q '^app_end/' && echo "app_end 有变更" || echo "app_end 无变更"
          else
            if git diff --name-only $PREV_TAG ${{ github.ref_name }} | grep -q '^app_end/'; then
              echo "changes_detected=true" >> $GITHUB_OUTPUT
              echo "检测到 app_end 目录有变更"
            else
              echo "changes_detected=false" >> $GITHUB_OUTPUT
              echo "app_end 目录无变更，跳过构建"
            fi

  # Job 2: 构建 APK
  build-app:
    needs: detect-changes
    if: needs.detect-changes.outputs.app_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Extract version from tag
        run: echo "APP_VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Setup EAS
        run: npm install -g eas-cli

      - name: Trigger build
        run: |
          cd ${{ vars.APP_PATH }} && \
          npm install && \
          eas build --platform android --non-interactive
        env:
          APP_VERSION: ${{ env.APP_VERSION }}

      - name: Download APK
        run: |
          # 等待构建完成并下载 APK（最多等待 30 分钟）
          for i in {1..180}; do
            BUILD_INFO=$(eas build:list --platform=android --limit=1 --json)
            STATUS=$(echo "$BUILD_INFO" | jq -r '.[0].status')
            BUILD_ID=$(echo "$BUILD_INFO" | jq -r '.[0].id')

            if [ "$STATUS" = "finished" ]; then
              break
            fi
            sleep 10
          done

          # 获取 artifact URL 并下载
          BUILD_URL=$(eas build:view "$BUILD_ID" --json | jq -r '.artifacts[0].url')
          curl -L -o "pinf-${{ github.ref_name }}.apk" "$BUILD_URL"

      - name: Generate Release Notes
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            echo "## 更新内容" > release_notes.txt
            git log $PREV_TAG..${{ github.ref_name }} --pretty=format:"- %s" >> release_notes.txt
          else
            echo "## 首次发布" > release_notes.txt
            git log --pretty=format:"- %s" -10 >> release_notes.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: "pinf-${{ github.ref_name }}.apk"
          body_path: release_notes.txt
          tag_name: ${{ github.ref_name }}
          name: App ${{ github.ref_name }}
