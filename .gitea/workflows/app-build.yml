name: APP Build

on:
  push:
    tags:
      - 'v*.*.*'
      - 'app-*'

env:
  DEPLOY_PORT: 22
  EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

jobs:
  detect-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 检出代码
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 提取版本号（v1.2.3 → 1.2.3）
      - name: Extract version from tag
        run: echo "APP_VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      # 检测 app_end 目录是否有变更
      - name: Check app_end changes
        id: check_changes
        run: |
          # 获取上一个 tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            # 如果没有上一个 tag，与初始 commit 比较
            echo "changes_detected=true" >> $GITHUB_OUTPUT
            echo "没有找到上一个 tag，将进行检测"
            git diff --name-only origin/${{ github.default_branch }} | grep -q '^app_end/' && echo "app_end 有变更" || echo "app_end 无变更"
          else
            # 比较当前 tag 与上一个 tag 的差异
            if git diff --name-only $PREV_TAG ${{ github.ref_name }} | grep -q '^app_end/'; then
              echo "changes_detected=true" >> $GITHUB_OUTPUT
              echo "检测到 app_end 目录有变更"
            else
              echo "changes_detected=false" >> $GITHUB_OUTPUT
              echo "app_end 目录无变更，跳过构建"
            fi
          fi

      # 安装 EAS CLI
      - name: Setup EAS
        if: steps.check_changes.outputs.changes_detected == 'true'
        run: npm install -g eas-cli

      # 构建 APK
      - name: Build APK
        if: steps.check_changes.outputs.changes_detected == 'true'
        run: |
          cd ${{ vars.APP_PATH }} && \
          npm install && \
          eas build --platform android --non-interactive --output ../app.apk
        env:
          APP_VERSION: ${{ env.APP_VERSION }}

      # 生成 Release Notes
      - name: Generate Release Notes
        if: steps.check_changes.outputs.changes_detected == 'true'
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            echo "## 更新内容" > release_notes.txt
            git log $PREV_TAG..${{ github.ref_name }} --pretty=format:"- %s" >> release_notes.txt
          else
            echo "## 首次发布" > release_notes.txt
            git log --pretty=format:"- %s" -10 >> release_notes.txt
          fi

      # 创建 Release 并上传 APK
      - name: Create Release
        if: steps.check_changes.outputs.changes_detected == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: app.apk
          body_path: release_notes.txt
          tag_name: ${{ github.ref_name }}
          name: App ${{ github.ref_name }}
