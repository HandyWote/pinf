name: APP EAS Build

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

env:
  APP_PATH: app_end

jobs:
  build-app-eas:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install EAS CLI
        run: npm install -g eas-cli@latest

      - name: Verify Expo auth
        working-directory: ${{ env.APP_PATH }}
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${EXPO_TOKEN:-}" ]; then
            echo "EXPO_TOKEN is required"
            exit 1
          fi
          eas whoami

      - name: Build APK on EAS cloud
        id: eas_build
        working-directory: ${{ env.APP_PATH }}
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          cd app_end && bun install --frozen-lockfile
          set -euo pipefail
          BUILD_JSON=$(eas build \
            --platform android \
            --profile production \
            --non-interactive \
            --wait \
            --json)

          echo "$BUILD_JSON" > /tmp/eas-build.json

          BUILD_URL=$(jq -r '.[0].artifacts.buildUrl // .artifacts.buildUrl // empty' /tmp/eas-build.json)
          if [ -z "$BUILD_URL" ]; then
            echo "Failed to get build URL from EAS output"
            cat /tmp/eas-build.json
            exit 1
          fi

          echo "build_url=$BUILD_URL" >> "$GITHUB_OUTPUT"

      - name: Download APK artifact
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          OUTPUT_DIR="${GITHUB_WORKSPACE}/output"
          APK_FILE="${OUTPUT_DIR}/pinf-${TAG}.apk"

          mkdir -p "$OUTPUT_DIR"
          curl -fL "${{ steps.eas_build.outputs.build_url }}" -o "$APK_FILE"

          if [ ! -s "$APK_FILE" ]; then
            echo "Downloaded APK is empty"
            exit 1
          fi

          ls -lh "$APK_FILE"
          sha256sum "$APK_FILE"

      - name: Generate Release Notes
        run: |
          set -euo pipefail
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            echo "## Updates" > release_notes.txt
            git log "$PREV_TAG".."${GITHUB_REF_NAME}" --pretty=format:"- %s" >> release_notes.txt
          else
            echo "## Initial Release" > release_notes.txt
            git log --pretty=format:"- %s" -10 >> release_notes.txt
          fi

      - name: Upload APK as artifact (debug)
        uses: actions/upload-artifact@v4
        with:
          name: pinf-apk
          path: ${{ github.workspace }}/output/pinf-${{ github.ref_name }}.apk
          retention-days: 7

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          APK_FILE="${GITHUB_WORKSPACE}/output/pinf-${TAG}.apk"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$APK_FILE#pinf-${TAG}.apk" --clobber
            gh release edit "$TAG" --notes-file release_notes.txt
          else
            gh release create "$TAG" "$APK_FILE#pinf-${TAG}.apk" \
              --title "App $TAG" \
              --notes-file release_notes.txt
          fi

          echo "GitHub release published: $TAG"
