name: APP Collect Build

on:
  workflow_run:
    workflows:
      - APP EAS Build
    types:
      - completed
  workflow_dispatch:
    inputs:
      build_id:
        description: EAS Build ID（手动触发时必填）
        required: false
        type: string
      tag:
        description: Release Tag（默认使用触发来源 tag 或 v-manual-<run_id>）
        required: false
        type: string
      timeout_minutes:
        description: 最长等待分钟数（默认 90）
        required: false
        default: "90"
        type: string
      poll_interval_seconds:
        description: 轮询间隔秒数（默认 30）
        required: false
        default: "30"
        type: string

permissions:
  actions: read
  contents: write

jobs:
  collect-build:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install EAS CLI
        run: |
          set -euo pipefail
          npm install -g eas-cli@latest

      - name: Download build metadata from trigger run
        if: ${{ github.event_name == 'workflow_run' }}
        uses: actions/download-artifact@v4
        with:
          name: eas-build-meta
          path: /tmp/eas-meta
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve collect parameters
        id: resolve
        run: |
          set -euo pipefail

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            BUILD_ID="${{ inputs.build_id }}"
            TAG="${{ inputs.tag }}"
            TIMEOUT_MINUTES="${{ inputs.timeout_minutes }}"
            POLL_INTERVAL_SECONDS="${{ inputs.poll_interval_seconds }}"
          else
            META_FILE="/tmp/eas-meta/eas-build-meta.json"
            if [ ! -f "$META_FILE" ]; then
              echo "Missing build metadata artifact: $META_FILE"
              exit 1
            fi

            BUILD_ID="$(jq -r '.build_id // empty' "$META_FILE")"
            TAG="$(jq -r '.tag // empty' "$META_FILE")"
            TIMEOUT_MINUTES="90"
            POLL_INTERVAL_SECONDS="30"
          fi

          if [ -z "$BUILD_ID" ]; then
            echo "build_id is required. For manual run, please provide workflow input build_id."
            exit 1
          fi

          if [ -z "$TAG" ]; then
            TAG="v-manual-${GITHUB_RUN_ID}"
          fi

          if ! [[ "$TIMEOUT_MINUTES" =~ ^[0-9]+$ ]]; then
            echo "timeout_minutes must be an integer"
            exit 1
          fi

          if ! [[ "$POLL_INTERVAL_SECONDS" =~ ^[0-9]+$ ]]; then
            echo "poll_interval_seconds must be an integer"
            exit 1
          fi

          if [ "$POLL_INTERVAL_SECONDS" -lt 10 ]; then
            echo "poll_interval_seconds must be >= 10"
            exit 1
          fi

          echo "build_id=$BUILD_ID" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "timeout_minutes=$TIMEOUT_MINUTES" >> "$GITHUB_OUTPUT"
          echo "poll_interval_seconds=$POLL_INTERVAL_SECONDS" >> "$GITHUB_OUTPUT"

      - name: Poll EAS build status
        id: poll
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          BUILD_ID: ${{ steps.resolve.outputs.build_id }}
          TIMEOUT_MINUTES: ${{ steps.resolve.outputs.timeout_minutes }}
          POLL_INTERVAL_SECONDS: ${{ steps.resolve.outputs.poll_interval_seconds }}
        run: |
          set -euo pipefail

          if [ -z "${EXPO_TOKEN:-}" ]; then
            echo "EXPO_TOKEN is required"
            exit 1
          fi

          DEADLINE=$(( $(date +%s) + TIMEOUT_MINUTES * 60 ))

          while true; do
            eas build:view "$BUILD_ID" --json > /tmp/eas-build-view.json
            STATUS="$(jq -r '.status // empty' /tmp/eas-build-view.json | tr '[:lower:]' '[:upper:]')"
            echo "Current status: ${STATUS:-UNKNOWN}"

            if [ "$STATUS" = "FINISHED" ]; then
              break
            fi

            if [ "$STATUS" = "ERRORED" ] || [ "$STATUS" = "CANCELED" ] || [ "$STATUS" = "CANCELLED" ] || [ "$STATUS" = "FAILED" ]; then
              echo "EAS build failed with status: $STATUS"
              cat /tmp/eas-build-view.json
              exit 1
            fi

            if [ "$(date +%s)" -ge "$DEADLINE" ]; then
              echo "Timeout while waiting for EAS build: $BUILD_ID"
              exit 1
            fi

            sleep "$POLL_INTERVAL_SECONDS"
          done

          BUILD_URL="$(jq -r '.artifacts.buildUrl // empty' /tmp/eas-build-view.json)"
          if [ -z "$BUILD_URL" ]; then
            echo "Build finished but artifacts.buildUrl is empty"
            cat /tmp/eas-build-view.json
            exit 1
          fi

          echo "build_url=$BUILD_URL" >> "$GITHUB_OUTPUT"

      - name: Download APK artifact
        id: download
        env:
          TAG: ${{ steps.resolve.outputs.tag }}
          BUILD_URL: ${{ steps.poll.outputs.build_url }}
        run: |
          set -euo pipefail

          OUTPUT_DIR="${GITHUB_WORKSPACE}/output"
          APK_FILE="${OUTPUT_DIR}/pinf-${TAG}.apk"

          mkdir -p "$OUTPUT_DIR"
          curl -fL "$BUILD_URL" -o "$APK_FILE"

          if [ ! -s "$APK_FILE" ]; then
            echo "Downloaded APK is empty"
            exit 1
          fi

          ls -lh "$APK_FILE"
          sha256sum "$APK_FILE"
          echo "apk_file=$APK_FILE" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        env:
          TAG: ${{ steps.resolve.outputs.tag }}
        run: |
          set -euo pipefail

          if git rev-parse "refs/tags/${TAG}" >/dev/null 2>&1; then
            PREV_TAG=$(git describe --tags --abbrev=0 "refs/tags/${TAG}^" 2>/dev/null || echo "")
            if [ -n "$PREV_TAG" ]; then
              echo "## Updates" > release_notes.txt
              git log "$PREV_TAG..refs/tags/${TAG}" --pretty=format:"- %s" >> release_notes.txt
            else
              echo "## Initial Release" > release_notes.txt
              git log "refs/tags/${TAG}" --pretty=format:"- %s" -10 >> release_notes.txt
            fi
          else
            echo "## Manual Collect Release" > release_notes.txt
            echo "- Source build ID: ${{ steps.resolve.outputs.build_id }}" >> release_notes.txt
            echo "- Generated at: $(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> release_notes.txt
          fi

      - name: Upload APK as artifact (debug)
        uses: actions/upload-artifact@v4
        with:
          name: pinf-apk
          path: ${{ steps.download.outputs.apk_file }}
          retention-days: 7

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.resolve.outputs.tag }}
          APK_FILE: ${{ steps.download.outputs.apk_file }}
        run: |
          set -euo pipefail

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$APK_FILE#pinf-${TAG}.apk" --clobber
            gh release edit "$TAG" --notes-file release_notes.txt
          else
            gh release create "$TAG" "$APK_FILE#pinf-${TAG}.apk" \
              --title "App $TAG" \
              --notes-file release_notes.txt
          fi

          echo "GitHub release published: $TAG"

      - name: Collect summary
        run: |
          set -euo pipefail
          echo "EAS build collected and released." >> "$GITHUB_STEP_SUMMARY"
          echo "- Build ID: \`${{ steps.resolve.outputs.build_id }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tag: \`${{ steps.resolve.outputs.tag }}\`" >> "$GITHUB_STEP_SUMMARY"
