name: Webend Deploy

on:
  workflow_dispatch:
  release:
    types:
      - published

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Build
        working-directory: webend
        run: |
          set -euo pipefail
          bun install --frozen-lockfile
          bun run build

      - name: Upload dist to server (remove old files first)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USER }}
          password: ${{ secrets.SFTP_PASSWORD }}
          port: 22
          source: "webend/dist/*"
          target: "/opt/1panel/apps/openresty/openresty/www/sites/www.pinf.top/index/"
          rm: true
